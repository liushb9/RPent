<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RPent · Live Monitor</title>
<style>
  :root {
    --bg: #f6f1e8; --panel: #fffdf8; --panel2: #efe7d8; --border: #d8cfbe;
    --fg: #3b3934; --muted: #877f70; --accent: #2f6fd6;
    --green: #2f8a3e; --red: #c8392f; --yellow: #b07a0a; --purple: #7a52c4;
    --tool: #1d6fc5;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font: 16px/1.6 -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; letter-spacing: .3px; }
  header h1 .dot { color: var(--accent); }
  select {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 11px; font-size: 15px; max-width: 460px;
  }
  .badge {
    font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px;
    text-transform: uppercase; letter-spacing: .5px; border: 1px solid transparent;
  }
  .b-running { background: rgba(47,138,62,.14); color: var(--green); border-color: var(--green); animation: pulse 1.6s infinite; }
  .b-done { background: rgba(47,111,214,.14); color: var(--accent); border-color: var(--accent); }
  .b-stale { background: rgba(135,127,112,.16); color: var(--muted); border-color: var(--muted); }
  .b-ok { background: rgba(47,138,62,.14); color: var(--green); border-color: var(--green); }
  .b-fail { background: rgba(200,57,47,.12); color: var(--red); border-color: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  .meta { color: var(--muted); font-size: 13px; }
  .meta b { color: var(--fg); font-weight: 600; }
  .grow { flex: 1; }

  main { flex: 1; display: grid; grid-template-columns: var(--leftw, 1.4fr) 6px 1fr; gap: 0; min-height: 0; }
  .col { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
  .col.right { display: grid; grid-template-rows: var(--frameh, 42vh) 6px 1fr; min-height: 0; }

  /* draggable splitters */
  .gutter { background: var(--border); position: relative; z-index: 5; }
  .gutter::after { content: ""; position: absolute; inset: 0; }
  .gutter:hover, .gutter.dragging { background: var(--accent); }
  .gutter-v { cursor: col-resize; }
  .gutter-v::after { left: -3px; right: -3px; }   /* fatter hit area */
  .gutter-h { cursor: row-resize; }
  .gutter-h::after { top: -3px; bottom: -3px; }
  body.resizing { cursor: inherit; user-select: none; }
  body.resizing iframe, body.resizing .frame-media { pointer-events: none; }
  .panel-title {
    padding: 10px 16px; font-size: 13px; text-transform: uppercase; letter-spacing: .6px;
    color: var(--muted); background: var(--panel); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .panel-title .count { color: var(--fg); font-weight: 600; }

  /* transcript */
  #transcript { flex: 1; overflow-y: auto; padding: 14px 18px; }
  .ev { margin-bottom: 8px; }
  .ev.turn { color: var(--purple); font-weight: 600; font-size: 13.5px;
    border-top: 1px dashed var(--border); padding-top: 10px; margin-top: 10px; }
  .ev.text { white-space: pre-wrap; word-wrap: break-word; }
  .ev.thinking details {
    background: rgba(210,153,34,.08); border: 1px solid rgba(210,153,34,.35);
    border-radius: 6px; padding: 6px 9px;
  }
  .ev.thinking summary {
    color: var(--yellow); cursor: pointer; font-size: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  .ev.thinking pre {
    white-space: pre-wrap; word-wrap: break-word; margin: 8px 0 0;
    color: var(--fg); font: inherit;
  }
  .ev.meta { color: var(--muted); font-size: 13px; font-style: italic; }
  .ev.tool_call, .ev.tool_result {
    font-size: 13.5px;
    background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 9px; overflow-x: auto;
  }
  .ev.tool_call { border-left: 3px solid var(--tool); }
  .ev.tool_result { border-left: 3px solid var(--muted); opacity: .85; }
  .ev .tname { color: var(--accent); font-weight: 600; }
  .ev .tname.err { color: var(--red); }
  .ev .args { color: var(--muted); }

  /* collapsible tool-call group */
  .toolgroup { margin: 6px 0; }
  .tg-head {
    font-size: 13.5px;
    color: var(--muted); cursor: pointer; user-select: none; padding: 3px 6px;
    border-radius: 6px; display: inline-block;
  }
  .tg-head:hover { color: var(--fg); background: var(--panel2); }
  .tg-head::before { content: "▸ "; color: var(--tool); }
  .tg-body { display: none; margin-top: 4px; }
  .toolgroup.open > .tg-body,
  #transcript.alltools .tg-body { display: block; }
  .toolgroup.open > .tg-head::before,
  #transcript.alltools .tg-head::before { content: "▾ "; }
  #transcript.alltools .tg-head { pointer-events: none; }
  .tg-body .ev { margin-bottom: 5px; }

  /* frame */
  .framewrap { background: #e3dccd; display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid var(--border); position: relative; min-height: 200px; }
  .frame-media {
    position: absolute; inset: 0; margin: auto; max-width: 100%; max-height: 100%;
    object-fit: contain; display: block;
    /* Hidden buffers still occupy layout — visibility keeps intrinsic sizing
       correct so the visible sibling doesn't re-flow on swap. Pointer events
       are disabled so the hidden video's controls don't intercept clicks. */
    visibility: hidden; pointer-events: none;
  }
  .frame-media.visible { visibility: visible; pointer-events: auto; }
  .frame-tabs { position: absolute; top: 8px; right: 8px; display: flex; gap: 6px; z-index: 2; }
  .frame-tabs button {
    background: rgba(255,253,248,.85); color: var(--muted); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 12px; font-size: 13px; cursor: pointer;
  }
  .frame-tabs button.active { color: var(--fg); border-color: var(--accent); background: var(--panel); }
  .frame-cap { position: absolute; bottom: 8px; left: 10px; font-size: 13px; color: #f6f1e8;
    background: rgba(74,60,46,.72); padding: 3px 9px; border-radius: 4px; z-index: 2; }

  /* timeline */
  #timeline { overflow-y: auto; padding: 6px 0; }
  .step { display: flex; gap: 10px; padding: 9px 16px; border-bottom: 1px solid var(--border); font-size: 15px; }
  .step:hover { background: var(--panel2); }
  .step.hasclip { cursor: pointer; }
  .step.episode { cursor: pointer; background: rgba(47,111,214,.08); }
  .step.hasclip .idx::after { content: "▶"; color: var(--green); font-size: 10px; margin-left: 4px; }
  .step.episode .idx::after { content: "▶"; color: var(--accent); font-size: 10px; margin-left: 4px; }
  .step .idx { color: var(--muted); width: 30px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .step .body { min-width: 0; flex: 1; }
  .step .act { font-weight: 600; color: var(--accent); }
  .step .det { color: var(--muted); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .step .el { color: var(--muted); font-size: 12px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .step.term { background: rgba(47,138,62,.08); }

  /* launcher (start screen) */
  #launcher {
    position: fixed; inset: 0; z-index: 50; background: var(--bg);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 24px; overflow-y: auto;
  }
  #launcher.hidden { display: none; }
  .launch-card {
    width: 100%; max-width: 680px; background: var(--panel);
    border: 1px solid var(--border); border-radius: 14px; padding: 32px 34px;
    box-shadow: 0 12px 40px rgba(60,50,40,.18);
  }
  .launch-card h2 { margin: 0 0 4px; font-size: 22px; font-weight: 600; }
  .launch-card h2 .dot { color: var(--accent); }
  .launch-card .sub { color: var(--muted); font-size: 14px; margin-bottom: 22px; }
  .lform { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 20px; }
  .lfield { display: flex; flex-direction: column; gap: 6px; }
  .lfield.full { grid-column: 1 / -1; }
  .lfield.hidden { display: none; }
  .lfield label { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  .lfield input[type=text], .lfield input[type=number], .lfield select {
    background: var(--panel2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 9px 11px; font-size: 15px; width: 100%; max-width: none;
  }
  .lcheck { flex-direction: row; align-items: center; gap: 8px; }
  .lcheck label { text-transform: none; letter-spacing: 0; font-size: 14px; color: var(--fg); }
  .launch-actions { display: flex; align-items: center; gap: 14px; margin-top: 24px; }
  #runBtn {
    background: var(--green); color: #07210e; border: none; border-radius: 8px;
    padding: 12px 30px; font-size: 16px; font-weight: 700; cursor: pointer; letter-spacing: .3px;
  }
  #runBtn:hover { filter: brightness(1.08); }
  #runBtn:disabled { opacity: .55; cursor: default; }
  #launchStatus { color: var(--muted); font-size: 14px; }
  @media (max-width: 720px), (max-height: 620px) {
    #launcher { padding: 12px; }
    .launch-card { padding: 18px; }
    .lform { grid-template-columns: 1fr; gap: 12px; }
  }

  .empty { color: var(--muted); padding: 24px 14px; font-style: italic; font-size: 14px; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #c9bea9; border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
  <div id="launcher" class="hidden">
    <div class="launch-card">
      <h2><span class="dot">●</span> RPent · New Run</h2>
      <div class="sub">Review the config, then click Run to start the agent.</div>
      <div class="lform">
        <div class="lfield full">
          <label for="f-suite">Suite</label>
          <select id="f-suite">
            <option value="libero_object_task">libero_object_task</option>
            <option value="libero_object_swap">libero_object_swap</option>
            <option value="libero_object_lan">libero_object_lan</option>
            <option value="libero_goal_task">libero_goal_task</option>
            <option value="libero_goal_swap">libero_goal_swap</option>
            <option value="libero_goal_lan">libero_goal_lan</option>
            <option value="libero_spatial_task">libero_spatial_task</option>
            <option value="libero_spatial_swap">libero_spatial_swap</option>
            <option value="libero_spatial_lan">libero_spatial_lan</option>
            <option value="libero_10">libero_10</option>
            <option value="libero_10_task">libero_10_task</option>
            <option value="libero_10_swap">libero_10_swap</option>
            <option value="libero_10_lan">libero_10_lan</option>
          </select>
        </div>
        <div class="lfield">
          <label for="f-task">Task</label>
          <input type="number" id="f-task" min="0" step="1" />
        </div>
        <div class="lfield">
          <label for="f-seed">Seed</label>
          <input type="number" id="f-seed" min="0" step="1" />
        </div>
        <div class="lfield">
          <label for="f-planner">Planner (LLM backend)</label>
          <select id="f-planner">
            <option value="api">api</option>
            <option value="claude_code">claude_code</option>
            <option value="codex">codex</option>
          </select>
        </div>
        <div class="lfield">
          <label for="f-max-turns">Max turns</label>
          <input type="number" id="f-max-turns" min="1" step="1" />
        </div>
        <div class="lfield backend-field" data-backends="api">
          <label for="f-max-tokens">Max tokens</label>
          <input type="number" id="f-max-tokens" min="1" step="1" />
        </div>
        <div class="lfield">
          <label for="f-max-episode-steps">Max episode steps</label>
          <input type="number" id="f-max-episode-steps" min="1" step="1" />
        </div>
        <div class="lfield backend-field full" data-backends="api claude_code codex">
          <label for="f-model_preset">Model preset</label>
          <select id="f-model_preset"></select>
        </div>
        <div class="lfield backend-field full" data-backends="api claude_code codex">
          <label for="f-model_custom">Custom model <span style="text-transform:none">(optional)</span></label>
          <input type="text" id="f-model_custom" placeholder="provider:model or alias" />
        </div>
        <div class="lfield backend-field" data-backends="claude_code">
          <label for="f-claude-code-max-budget-usd">Claude Code budget USD</label>
          <input type="number" id="f-claude-code-max-budget-usd" min="0" step="0.01" placeholder="MAX_BUDGET_USD" />
        </div>
        <div class="lfield backend-field" data-backends="claude_code codex">
          <label for="f-planner-timeout-s">Planner timeout s</label>
          <input type="number" id="f-planner-timeout-s" min="1" step="1" placeholder="CELL_TIMEOUT_S / CODEX_TIMEOUT_S" />
        </div>
        <div class="lfield">
          <label for="f-cuda-device">CUDA device <span style="text-transform:none">(blank = default)</span></label>
          <input type="text" id="f-cuda-device" placeholder="default" />
        </div>
      </div>
      <div class="launch-actions">
        <button id="runBtn">Run</button>
        <span id="launchStatus"></span>
      </div>
    </div>
  </div>

  <header>
    <h1><span class="dot">●</span> RPent <span class="meta">Live Monitor</span></h1>
    <span id="statusBadge" class="badge b-stale">—</span>
    <span id="resultBadge" class="badge b-fail" style="display:none"></span>
    <span class="meta" id="taskMeta"></span>
    <span class="grow"></span>
    <span class="meta" id="usageMeta"></span>
    <span class="meta" id="connMeta"></span>
  </header>

  <main>
    <div class="col left">
      <div class="panel-title">
        Agent reasoning &amp; tool calls
        <span class="count" id="evCount"></span>
        <span class="grow"></span>
        <label class="meta" style="text-transform:none;letter-spacing:0">
          <input type="checkbox" id="showtools" /> expand tool calls
        </label>
        <label class="meta" style="text-transform:none;letter-spacing:0">
          <input type="checkbox" id="autoscroll" checked /> auto-scroll
        </label>
      </div>
      <div id="transcript"><div class="empty">Select a run to begin.</div></div>
    </div>

    <div class="gutter gutter-v" id="gutterV" title="拖动调整左右宽度"></div>

    <div class="col right">
      <div class="framewrap">
        <div class="frame-tabs">
          <button data-kind="agent" class="active">realtime-Pi0 view</button>
          <button data-kind="camera">realtime-camera</button>
        </div>
        <img class="frame-media" id="frame-a" alt="" />
        <img class="frame-media" id="frame-b" alt="" />
        <video class="frame-media" id="video-a" controls playsinline></video>
        <video class="frame-media" id="video-b" controls playsinline></video>
        <div class="frame-cap" id="frameCap">waiting for first frame…</div>
      </div>
      <div class="gutter gutter-h" id="gutterH" title="拖动调整画面高度"></div>
      <div class="col" style="min-height:0">
        <div class="panel-title">Action timeline <span class="count" id="stepCount"></span></div>
        <div id="timeline"><div class="empty">No actions yet.</div></div>
      </div>
    </div>
  </main>

<script>
const $ = (s) => document.querySelector(s);
let curRun = null, evShown = 0, frameKind = "agent", es = null, frameIdx = -1;
let actionVideo = null;
let episodeVideoAvailable = false;
let lastRealtimeFrameKind = "agent";
let autoActionLastStep = 0;
let autoActionPrimed = false;
let autoActionPlayback = null;
let autoActionReturnTimer = null;
let stepTransitioning = false;  // suppress realtime frames during step transition
const AUTO_ACTION_RETURN_DELAY_MS = 300;
const MODEL_PRESETS = {
  api: [
    "",
    "anthropic:claude-opus-4-7",
    "anthropic:claude-opus-4-8",
    "anthropic:claude-sonnet-4-5",
    "openai:gpt-5.5",
    "openai-chat:glm-5.2",
  ],
  claude_code: ["", "claude-opus-4-7", "sonnet", "opus"],
  codex: [""],
};

// --- Double-buffered media swap ------------------------------------------
// Two <img> + two <video> live in the DOM at the same position. Exactly one
// carries the `.visible` class at any moment. When switching to new media
// (new realtime frame URL, new tab, new video), we PRE-LOAD into the OTHER
// buffer and only toggle `.visible` after `load` (img) / `canplay` (video)
// fires. Result: no black flash, because the previously-visible element
// stays painted the whole time the new one is loading.
const imgA = () => $("#frame-a");
const imgB = () => $("#frame-b");
const vidA = () => $("#video-a");
const vidB = () => $("#video-b");
let activeImg = null;   // whichever of imgA/imgB is currently .visible
let activeVideo = null; // whichever of vidA/vidB is currently .visible

function cancelAutoActionReturn() {
  if (autoActionReturnTimer) {
    clearTimeout(autoActionReturnTimer);
    autoActionReturnTimer = null;
  }
}

function _bufferPair(kind) {
  return kind === "img" ? [imgA(), imgB()] : [vidA(), vidB()];
}

function _pickTarget(kind, url) {
  const [a, b] = _bufferPair(kind);
  if (a._loadedSrc === url) return a;
  if (b._loadedSrc === url) return b;
  const active = kind === "img" ? activeImg : activeVideo;
  return a === active ? b : a;
}

function _showBuffer(el) {
  for (const m of document.querySelectorAll(".frame-media.visible")) {
    if (m !== el) m.classList.remove("visible");
  }
  el.classList.add("visible");
  if (el.tagName === "IMG") activeImg = el;
  else activeVideo = el;
  // Whenever we settle on new visible media, pause the *other* video so it
  // doesn't keep playing audio underneath (matters most on video → img
  // auto-return; browsers hidden via visibility keep playing by default).
  for (const v of [vidA(), vidB()]) {
    if (v !== el && !v.paused) { try { v.pause(); } catch {} }
  }
}

// --- Sequential media swap queue ------------------------------------------
// Every swap runs to completion (image `load` or video `canplay`) before
// the next one starts, so the previously-visible element stays painted
// until the new one is decoded — no black flash.
//
// Realtime frames pushed by SSE while a swap is in flight are queued in
// order, never dropped or interrupted, so switching tabs and rolling
// updates do not cut each other short.
//
// Videos may hold the queue until they finish playing (`holdUntilEnded`),
// preventing realtime frame updates from cutting a video short.
// `source: "user"` on a spec (tab click, manual step replay, click on
// episode) drops pending "auto" specs and releases any current hold so
// user actions stay responsive — the currently-visible element is not
// interrupted, but its hold is released as soon as the click arrives.
const swapQueue = [];
let swapInFlight = false;
let releaseHold = null;   // release the current holdUntilEnded, if any
let inflightGen = 0;      // bump to invalidate the in-flight swap

function swapMedia(spec) {
  if (spec.source === "user") {
    for (let i = swapQueue.length - 1; i >= 0; i--) {
      if (swapQueue[i].source !== "user") swapQueue.splice(i, 1);
    }
    if (releaseHold) {
      // Currently held on a video's end — release it so the click
      // doesn't wait through the rest of the clip. Call `releaseHold`
      // DIRECTLY (don't null it before the call): `release` itself
      // guards against double-release by checking `releaseHold !== release`
      // and nulls the global on entry. If we nulled it here first, that
      // guard would trip on the very first invocation and `done()` would
      // never fire → the queue would wedge with swapInFlight stuck true
      // and no further click would take effect.
      releaseHold();
    } else if (swapInFlight) {
      // An auto swap is still loading (finish hasn't run yet, so there's
      // no hold to release). Abandon it: bumping `inflightGen` makes the
      // in-flight swap's finish + done no-op when they eventually fire,
      // so the click's spec can start immediately without waiting for
      // the abandoned fetch to complete.
      inflightGen++;
      swapInFlight = false;
    }
  }
  swapQueue.push(spec);
  _pumpSwap();
}

function _pumpSwap() {
  if (swapInFlight || !swapQueue.length) return;
  const spec = swapQueue.shift();
  swapInFlight = true;
  const gen = ++inflightGen;
  _runSwap(spec, gen, () => {
    if (gen !== inflightGen) return;   // abandoned — skip queue advancement
    swapInFlight = false;
    _pumpSwap();
  });
}

function _runSwap({ kind, url, cap, onReady, holdUntilEnded }, gen, done) {
  const target = _pickTarget(kind, url);
  let finished = false;
  let fallbackTimer = null;

  const finish = (ok) => {
    if (finished) return;
    finished = true;
    if (fallbackTimer) { clearTimeout(fallbackTimer); fallbackTimer = null; }
    if (gen !== inflightGen) return;   // abandoned — don't paint or advance
    target._loadedSrc = ok ? url : null;
    _showBuffer(target);
    if (cap != null) $("#frameCap").textContent = cap;
    if (onReady) onReady(target);
    if (holdUntilEnded && kind === "video") {
      // Realtime frames wait on this video until it ends (natural or errored)
      // — or until a user action releases the hold via `swapMedia`.
      const release = () => {
        if (releaseHold !== release) return;
        releaseHold = null;
        target.removeEventListener("ended", release);
        target.removeEventListener("error", release);
        done();
      };
      releaseHold = release;
      target.addEventListener("ended", release, { once: true });
      target.addEventListener("error", release, { once: true });
    } else {
      done();
    }
  };

  // Fast path: URL already resident on this buffer (e.g. user replays the
  // same action video — no re-fetch, just play from cache).
  if (target._loadedSrc === url) {
    finish(true);
    return;
  }

  _clearMediaListeners(target);
  // Once we start loading a new URL into this buffer, its cached identity is
  // stale — clear it so an abandoned load can't leave `_loadedSrc` pointing
  // at content the buffer no longer actually holds.
  target._loadedSrc = null;
  if (kind === "img") {
    const onload = () => finish(true);
    const onerror = () => finish(false);
    target.addEventListener("load", onload, { once: true });
    target.addEventListener("error", onerror, { once: true });
    target._swapCleanup = () => {
      target.removeEventListener("load", onload);
      target.removeEventListener("error", onerror);
    };
    target.src = url;
  } else {
    // `{ once: true }` on `canplay` is CRITICAL: without it, the event
    // refires every time the video buffers or seeks, and running `onReady`
    // more than once resets `currentTime = 0` in a loop → the video would
    // stall at frame 0 and never actually play.
    const oncan = () => finish(true);
    const onerr = () => finish(false);
    target.addEventListener("canplay", oncan, { once: true });
    target.addEventListener("error", onerr, { once: true });
    target._swapCleanup = () => {
      target.removeEventListener("canplay", oncan);
      target.removeEventListener("error", onerr);
    };
    target.src = url;
    target.load();
  }

  // Fallback: if load/canplay never fires (network stall, missing keyframe),
  // swap anyway after 4s so the queue does not wedge on one bad fetch.
  fallbackTimer = setTimeout(() => finish(true), 4000);
}

function _clearMediaListeners(el) {
  if (el._swapCleanup) { el._swapCleanup(); el._swapCleanup = null; }
}

function resetAllMedia() {
  // Full reset — only used when selecting a new run. Drops the queue,
  // invalidates any in-flight swap (via inflightGen), releases any
  // pending hold, and wipes both buffers.
  swapQueue.length = 0;
  inflightGen++;
  if (releaseHold) releaseHold();
  swapInFlight = false;
  for (const el of [imgA(), imgB()]) {
    el.classList.remove("visible");
    _clearMediaListeners(el);
    el.removeAttribute("src");
    el._loadedSrc = null;
  }
  for (const v of [vidA(), vidB()]) {
    v.classList.remove("visible");
    _clearMediaListeners(v);
    v.onended = null; v.muted = false;
    try { v.pause(); } catch {}
    v.removeAttribute("src");
    v.load();
    v._loadedSrc = null;
  }
  activeImg = null;
  activeVideo = null;
}

function fmtArgs(o) {
  if (o == null) return "";
  if (typeof o === "string") return o;
  try { return JSON.stringify(o); } catch { return String(o); }
}

async function loadRun() {
  const r = await fetch("/api/runs").then(x => x.json());
  if (!r.runs.length) {
    $("#taskMeta").textContent = `(no runs in ${r.runs_dir})`;
    return;
  }

  const run = r.runs[0];
  selectRun(run.id);
}

function setBadge(state) {
  const b = $("#statusBadge");
  b.className = "badge b-" + (state || "stale");
  b.textContent = state || "—";
}

function setResult(terminated, state) {
  const b = $("#resultBadge");
  if (state === "done" || terminated) {
    b.style.display = "";
    b.className = "badge " + (terminated ? "b-ok" : "b-fail");
    b.textContent = terminated ? "TASK SOLVED" : "not solved";
  } else {
    b.style.display = "none";
  }
}

function maxTimelineStep(tl) {
  if (!Array.isArray(tl) || !tl.length) return 0;
  return tl.reduce((m, s) => Math.max(m, Number(s.step) || 0), 0);
}

function maybeAutoPlayNewAction(tl, nextFrameIdx) {
  if (!Array.isArray(tl)) return false;
  const candidates = tl.filter(s =>
    s.has_action_video && (Number(s.step) || 0) > autoActionLastStep);
  autoActionLastStep = Math.max(autoActionLastStep, maxTimelineStep(tl));
  const step = candidates[candidates.length - 1];
  if (!step || !(frameKind === "agent" || frameKind === "camera")) return false;
  return playActionVideo(step, {
    auto: true,
    nextFrameIdx,
    returnKind: frameKind,
  });
}

function renderTimeline(tl, hasEpisodeVideo = episodeVideoAvailable) {
  tl = Array.isArray(tl) ? tl : [];
  episodeVideoAvailable = !!hasEpisodeVideo;
  const el = $("#timeline");
  const total = tl.length + (episodeVideoAvailable ? 1 : 0);
  $("#stepCount").textContent = total ? total : "";
  if (!tl.length && !episodeVideoAvailable) {
    el.innerHTML = '<div class="empty">No actions yet.</div>';
    return;
  }
  el.innerHTML = "";
  for (const s of tl) {
    if (s.step === 0 && !s.action) continue;
    const div = document.createElement("div");
    div.className = "step" + (s.terminated ? " term" : "");
    if (s.has_action_video) div.className += " hasclip";
    const res = s.result || {};
    let det = "";
    if (res.final_dist_m != null) det += `dist ${(+res.final_dist_m).toFixed(3)}m `;
    if (res.steps_used != null) det += `${res.steps_used}/${res.max_steps ?? "?"} steps `;
    if (res.lifted != null) det += `lifted=${res.lifted} `;
    if (res.chunks != null) det += `chunks=${res.chunks} `;
    det = det.trim() || fmtArgs(s.args).slice(0, 60);
    div.innerHTML = `<span class="idx">${s.step}</span>
      <div class="body"><span class="act">${s.action ?? "—"}</span>
      <div class="det" title="${fmtArgs(res).replace(/"/g,'&quot;')}">${det}</div></div>
      <span class="el">${s.elapsed_s != null ? s.elapsed_s + "s" : ""}</span>`;
    if (s.has_action_video) {
      div.title = "Click to replay this action";
      div.addEventListener("click", () => playActionVideo(s, {
        returnAfterEnd: true,
        returnKind: "agent",
      }));
    }
    el.appendChild(div);
  }
  if (episodeVideoAvailable) {
    const div = document.createElement("div");
    div.className = "step episode";
    div.title = "Click to replay the full episode";
    div.innerHTML = `<span class="idx">full</span>
      <div class="body"><span class="act">episode video</span>
      <div class="det">complete run video</div></div>
      <span class="el">finished</span>`;
    div.addEventListener("click", playEpisodeVideo);
    el.appendChild(div);
  }
}

let curToolGroup = null;

function makeToolEl(ev) {
  const div = document.createElement("div");
  div.className = "ev " + ev.type;
  if (ev.type === "tool_call") {
    div.innerHTML = `→ <span class="tname">${ev.tool}</span> <span class="args"></span>`;
    div.querySelector(".args").textContent = fmtArgs(ev.args);
  } else {
    const isErr = ev.result && ev.result.is_error;
    div.innerHTML = `← <span class="tname ${isErr ? "err" : ""}">${ev.tool}</span> <span class="args"></span>`;
    div.querySelector(".args").textContent = fmtArgs(ev.result);
  }
  return div;
}

function makeThinkingEl(ev) {
  const div = document.createElement("div");
  div.className = "ev thinking";
  const details = document.createElement("details");
  const summary = document.createElement("summary");
  const text = ev.text || "";
  summary.textContent = `thinking · ${text.length.toLocaleString()} chars`;
  const pre = document.createElement("pre");
  pre.textContent = text;
  details.appendChild(summary);
  details.appendChild(pre);
  div.appendChild(details);
  return div;
}

function appendEvents(events) {
  const box = $("#transcript");
  if (evShown === 0) { box.innerHTML = ""; curToolGroup = null; }
  for (const ev of events) {
    if (ev.type === "tool_call" || ev.type === "tool_result") {
      // collapse consecutive tool calls/results into one foldable group
      if (!curToolGroup) {
        const g = document.createElement("div");
        g.className = "toolgroup";
        g.innerHTML = `<div class="tg-head"><span class="tg-count">0</span> tool calls</div><div class="tg-body"></div>`;
        g.querySelector(".tg-head").addEventListener("click", () => g.classList.toggle("open"));
        box.appendChild(g);
        curToolGroup = g;
      }
      curToolGroup.querySelector(".tg-body").appendChild(makeToolEl(ev));
      const n = curToolGroup.querySelectorAll(".tg-body .ev.tool_call").length;
      curToolGroup.querySelector(".tg-count").textContent = n;
    } else {
      curToolGroup = null;  // close the group; turn/text render at top level
      if (ev.type === "thinking") {
        box.appendChild(makeThinkingEl(ev));
      } else {
        const div = document.createElement("div");
        div.className = "ev " + ev.type;
        if (ev.type === "meta") div.textContent = `[${ev.tag}] ${ev.text}`;
        else div.textContent = ev.text;
        box.appendChild(div);
      }
    }
  }
  evShown += events.length;
  $("#evCount").textContent = evShown ? evShown + " events" : "";
  if ($("#autoscroll").checked) box.scrollTop = box.scrollHeight;
}

let txInflight = false, txAgain = false;
async function refreshTranscript() {
  if (!curRun) return;
  // Serialize: only one fetch in flight at a time. Concurrent triggers
  // (selectRun + SSE ticks) would otherwise read the same `evShown`, fetch
  // overlapping chunks, and append in nondeterministic resolution order —
  // which is what made turns show up out of order / duplicated.
  if (txInflight) { txAgain = true; return; }
  txInflight = true;
  const run = curRun;
  try {
    const r = await fetch(
      `/api/run/transcript?run=${encodeURIComponent(run)}&since=${evShown}`
    ).then(x => x.json());
    if (run !== curRun) return;            // switched run mid-flight — drop
    if (r.events && r.events.length) appendEvents(r.events);
    else if (evShown === 0) $("#transcript").innerHTML = '<div class="empty">No transcript events yet.</div>';
  } catch (e) {
    /* transient — next tick retries */
  } finally {
    txInflight = false;
    if (txAgain) { txAgain = false; refreshTranscript(); }  // coalesced re-run
  }
}

function setFrameKind(kind) {
  cancelAutoActionReturn();
  if (kind === "agent" || kind === "camera") {
    lastRealtimeFrameKind = kind;
    autoActionPlayback = null;
  }
  frameKind = kind;
  if (kind !== "actionVideo") actionVideo = null;
  document.querySelectorAll(".frame-tabs button").forEach(b =>
    b.classList.toggle("active", b.dataset.kind === kind));
  frameIdx = -1;
  refreshFrame(undefined, { source: "user" });
}

function finishAutoActionPlayback() {
  if (!autoActionPlayback || autoActionReturnTimer) return;
  const playback = autoActionPlayback;
  autoActionReturnTimer = setTimeout(() => {
    autoActionReturnTimer = null;
    if (autoActionPlayback !== playback) return;
    const nextFrameIdx = playback.nextFrameIdx;
    const returnKind = playback.returnKind || lastRealtimeFrameKind || "agent";
    autoActionPlayback = null;
    actionVideo = null;
    frameKind = returnKind;
    frameIdx = -1;
    document.querySelectorAll(".frame-tabs button").forEach(b =>
      b.classList.toggle("active", b.dataset.kind === returnKind));
    // No video reset here — swapMedia keeps the finished video's last
    // frame painted until the realtime PNG is decoded, then flips visibility
    // — the transition never exposes the black framewrap background.
    refreshFrame(nextFrameIdx);
    refreshMeta({ autoPlayNewAction: true, nextFrameIdx });
  }, AUTO_ACTION_RETURN_DELAY_MS);
}

function playActionVideo(step, opts = {}) {
  if (!curRun || !step || !step.has_action_video) return false;
  cancelAutoActionReturn();
  actionVideo = step;
  autoActionPlayback = opts.auto || opts.returnAfterEnd
    ? {
        step: Number(step.step) || 0,
        nextFrameIdx: opts.nextFrameIdx,
        auto: !!opts.auto,
        returnKind: opts.returnKind || lastRealtimeFrameKind,
      }
    : null;
  frameKind = "actionVideo";
  document.querySelectorAll(".frame-tabs button").forEach(b => b.classList.remove("active"));
  frameIdx = -1;
  // Auto-triggered replays (from maybeAutoPlayNewAction) queue as "auto";
  // manual timeline clicks are user actions and jump the queue.
  refreshFrame(undefined, { source: opts.auto ? "auto" : "user" });
  return true;
}

function playEpisodeVideo() {
  if (!curRun || !episodeVideoAvailable) return;
  cancelAutoActionReturn();
  autoActionPlayback = null;
  actionVideo = null;
  frameKind = "video";
  document.querySelectorAll(".frame-tabs button").forEach(b => b.classList.remove("active"));
  frameIdx = -1;
  refreshFrame(undefined, { source: "user" });
}

function refreshFrame(idx, opts = {}) {
  if (!curRun) return;
  const source = opts.source || "auto";

  if (frameKind === "actionVideo") {
    if (!actionVideo) return;
    const stepNum = Number(actionVideo.step) || 0;
    // Note: no ``t=Date.now()`` cache-buster — action video files are
    // written once and never mutate, so the buffer's ``_loadedSrc`` cache
    // gives us instant replay when the same clip is re-clicked.
    const url = `/api/run/action-video?run=${encodeURIComponent(curRun)}&step=${encodeURIComponent(actionVideo.step)}`;
    const cap = `action #${actionVideo.step} ${actionVideo.action}`;
    swapMedia({
      kind: "video",
      url,
      cap,
      source,
      // Hold the queue until the clip ends so queued realtime frames don't
      // cut the replay short. User clicks (source: "user") still release
      // the hold on the current in-flight swap immediately.
      holdUntilEnded: true,
      onReady: (v) => {
        try { v.currentTime = 0; } catch {}
        v.playbackRate = 0.5;
        const shouldReturn =
          autoActionPlayback && autoActionPlayback.step === stepNum;
        v.muted = !!(shouldReturn && autoActionPlayback.auto);
        v.onended = shouldReturn ? finishAutoActionPlayback : null;
        const p = v.play();
        if (p && typeof p.catch === "function") {
          p.catch(() => { if (shouldReturn) finishAutoActionPlayback(); });
        }
      },
    });
    return;
  }

  if (frameKind === "video") {
    const url = `/api/run/video?run=${encodeURIComponent(curRun)}`;
    swapMedia({
      kind: "video",
      url,
      cap: "episode video",
      source,
      holdUntilEnded: true,
      onReady: (v) => {
        v.playbackRate = 1.0;
        v.muted = false;
        v.onended = null;
      },
    });
    return;
  }

  // realtime agent / camera frame — PNG mutates server-side, so
  // ``t=Date.now()`` keeps the URL unique per tick and defeats caching.
  if (idx != null && idx === frameIdx) return;
  frameIdx = idx ?? frameIdx;
  const url = `/api/run/frame?run=${encodeURIComponent(curRun)}&kind=${frameKind}&t=${Date.now()}`;
  swapMedia({
    kind: "img",
    url,
    cap: `${frameKind} · frame #${frameIdx}`,
    source,
  });
}

async function refreshMeta(opts = {}) {
  if (!curRun) return;
  const r = await fetch(`/api/run?run=${encodeURIComponent(curRun)}`).then(x => x.json());
  setBadge(r.state);
  setResult(r.terminated, r.state);
  $("#taskMeta").innerHTML = `<b>${r.suite ?? r.name}</b> · task ${r.task ?? "?"} · seed ${r.seed ?? "?"}`;
  if (r.usage) $("#usageMeta").textContent =
    `token in ${r.usage.in.toLocaleString()} · out ${r.usage.out.toLocaleString()} · ${r.usage.tool_calls} tools`;
  renderTimeline(r.timeline || [], r.has_video);
  if (opts.primeAutoActionStep) {
    autoActionLastStep = maxTimelineStep(r.timeline || []);
    autoActionPrimed = true;
  }
  const autoStarted = opts.autoPlayNewAction && autoActionPrimed && !autoActionPlayback
    ? maybeAutoPlayNewAction(r.timeline || [], opts.nextFrameIdx ?? r.frame_idx)
    : false;
  if (!r.has_video && frameKind === "video") setFrameKind("agent");
  if (
    !autoStarted
    && !autoActionPlayback
    && (frameKind === "agent" || frameKind === "camera")
  ) refreshFrame(r.frame_idx);
}

function connectSSE() {
  if (es) es.close();
  es = new EventSource(`/api/stream?run=${encodeURIComponent(curRun)}`);
  es.onmessage = (e) => {
    const sig = JSON.parse(e.data);
    setBadge(sig.state);
    setResult(sig.terminated, sig.state);
    if (sig.usage) $("#usageMeta").textContent =
      `tok in ${sig.usage.in.toLocaleString()} · out ${sig.usage.out.toLocaleString()} · ${sig.usage.tool_calls} tools`;
    $("#connMeta").textContent = "● live";
    refreshTranscript();
    // refresh timeline lazily on step change
    if (sig.n_steps !== connectSSE._steps) {
      connectSSE._steps = sig.n_steps;
      // Suppress realtime frame refreshes for the duration of the step
      // transition. ``refreshMeta`` is async (awaits ``/api/run``); during
      // that await, intermediate SSE snapshots carry the post-step
      // ``frame_idx`` but ``autoActionPlayback`` is not set yet, so the
      // realtime branch below would queue the completion image BEFORE
      // ``refreshMeta`` resolves and queues the action video — producing
      // the wrong order (image → video). The guard holds those ticks off
      // until ``refreshMeta`` finishes; if it queued an action video the
      // video's ``holdUntilEnded`` + ``autoActionPlayback`` take over the
      // suppression, and if it didn't, ``refreshMeta`` itself queues the
      // completion frame in the right place.
      stepTransitioning = true;
      refreshMeta({
        autoPlayNewAction: autoActionPrimed,
        primeAutoActionStep: !autoActionPrimed,
        nextFrameIdx: sig.frame_idx,
      }).finally(() => { stepTransitioning = false; });
      return;
    }
    if (sig.has_video && !episodeVideoAvailable) refreshMeta();
    if (
      !autoActionPlayback
      && !stepTransitioning
      && (frameKind === "agent" || frameKind === "camera")
      && sig.frame_idx != null
      && sig.frame_idx !== frameIdx
    ) refreshFrame(sig.frame_idx);
  };
  es.onerror = () => { $("#connMeta").textContent = "○ reconnecting…"; };
}

function selectRun(id) {
  cancelAutoActionReturn();
  curRun = id; evShown = 0; frameIdx = -1; connectSSE._steps = -1;
  curToolGroup = null;
  actionVideo = null;
  episodeVideoAvailable = false;
  autoActionLastStep = 0;
  autoActionPrimed = false;
  autoActionPlayback = null;
  stepTransitioning = false;
  resetAllMedia();
  frameKind = "agent"; lastRealtimeFrameKind = "agent";
  document.querySelectorAll(".frame-tabs button").forEach(b =>
    b.classList.toggle("active", b.dataset.kind === "agent"));
  $("#transcript").innerHTML = '<div class="empty">Loading…</div>';
  $("#timeline").innerHTML = '<div class="empty">…</div>';
  $("#frameCap").textContent = "waiting for first frame…";
  refreshMeta({ primeAutoActionStep: true });
  refreshTranscript();
  connectSSE();
}

document.querySelectorAll(".frame-tabs button").forEach(btn => {
  btn.addEventListener("click", () => setFrameKind(btn.dataset.kind));
});
$("#showtools").addEventListener("change", (e) => {
  $("#transcript").classList.toggle("alltools", e.target.checked);
});

// --- draggable splitters ---
function setupSplitter(handle, opts) {
  // opts: { axis:'x'|'y', container, prop, min, max, store }
  const saved = localStorage.getItem(opts.store);
  if (saved) opts.container.style.setProperty(opts.prop, saved);
  handle.addEventListener("mousedown", (e) => {
    e.preventDefault();
    handle.classList.add("dragging");
    document.body.classList.add("resizing");
    document.body.style.cursor = opts.axis === "x" ? "col-resize" : "row-resize";
    const rect = opts.container.getBoundingClientRect();
    const move = (ev) => {
      let v = opts.axis === "x" ? ev.clientX - rect.left : ev.clientY - rect.top;
      const limit = opts.axis === "x" ? rect.width : rect.height;
      v = Math.max(opts.min, Math.min(v, limit - opts.max));
      const px = v + "px";
      opts.container.style.setProperty(opts.prop, px);
      localStorage.setItem(opts.store, px);
    };
    const up = () => {
      handle.classList.remove("dragging");
      document.body.classList.remove("resizing");
      document.body.style.cursor = "";
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  });
  // double-click to reset to default
  handle.addEventListener("dblclick", () => {
    opts.container.style.removeProperty(opts.prop);
    localStorage.removeItem(opts.store);
  });
}
setupSplitter($("#gutterV"), {
  axis: "x", container: $("main"), prop: "--leftw",
  min: 280, max: 320, store: "wm.leftw",
});
setupSplitter($("#gutterH"), {
  axis: "y", container: $(".col.right"), prop: "--frameh",
  min: 120, max: 160, store: "wm.frameh",
});

// --- launcher (start screen) ---
function populateModelPresets(planner, selected = "") {
  const preset = $("#f-model_preset");
  const current = selected || preset.value || "";
  preset.innerHTML = "";
  for (const value of (MODEL_PRESETS[planner] || [""])) {
    const option = document.createElement("option");
    option.value = value;
    option.textContent = value || (planner === "api" ? "select a model" : "backend default");
    preset.appendChild(option);
  }
  preset.value = (MODEL_PRESETS[planner] || []).includes(current) ? current : "";
}

function updateBackendFields() {
  const planner = $("#f-planner").value;
  document.querySelectorAll("[data-backends]").forEach(el => {
    const allowed = (el.dataset.backends || "").split(/\s+/);
    el.classList.toggle("hidden", !allowed.includes(planner));
  });
  const currentModel = $("#f-model_custom").value || $("#f-model_preset").value;
  populateModelPresets(planner, currentModel);
}

function selectedModel() {
  return $("#f-model_custom").value.trim() || $("#f-model_preset").value.trim();
}

function showLauncher(defaults) {
  const d = defaults || {};
  const set = (id, val) => { $(id).value = val == null ? "" : val; };
  set("#f-suite", d.suite);
  set("#f-task", d.task);
  set("#f-seed", d.seed);
  set("#f-planner", d.planner || "claude_code");
  set("#f-max-turns", d["max-turns"]);
  set("#f-max-tokens", d["max-tokens"]);
  set("#f-max-episode-steps", d["max-episode-steps"]);
  set("#f-planner-timeout-s", d["planner-timeout-s"]);
  set("#f-claude-code-max-budget-usd", d["claude-code-max-budget-usd"]);
  set("#f-cuda-device", d["cuda-device"]);
  populateModelPresets($("#f-planner").value, d.model || "");
  if ((MODEL_PRESETS[$("#f-planner").value] || []).includes(d.model || "")) {
    set("#f-model_custom", "");
  } else {
    set("#f-model_custom", d.model);
  }
  updateBackendFields();
  $("#launcher").classList.remove("hidden");
}

function collectLaunchConfig() {
  const numOrNull = (id) => {
    const v = $(id).value.trim();
    return v === "" ? null : Number(v);
  };
  return {
    suite: $("#f-suite").value.trim(),
    task: numOrNull("#f-task"),
    seed: numOrNull("#f-seed"),
    planner: $("#f-planner").value,
    "max-turns": numOrNull("#f-max-turns"),
    "max-tokens": numOrNull("#f-max-tokens"),
    "max-episode-steps": numOrNull("#f-max-episode-steps"),
    model: selectedModel(),
    "planner-timeout-s": numOrNull("#f-planner-timeout-s"),
    "claude-code-max-budget-usd": numOrNull("#f-claude-code-max-budget-usd"),
    "cuda-device": $("#f-cuda-device").value.trim(),
  };
}

async function pollForRun() {
  try {
    const r = await fetch("/api/runs").then(x => x.json());
    if (r.runs && r.runs.length) {
      $("#launcher").classList.add("hidden");
      loadRun();
      return;
    }
  } catch (e) { /* transient — retry */ }
  setTimeout(pollForRun, 600);
}

async function onRun() {
  const config = collectLaunchConfig();
  const requiredNums = [
    ["Task", config.task],
    ["Seed", config.seed],
    ["Max turns", config["max-turns"]],
    ["Max episode steps", config["max-episode-steps"]],
  ];
  if (config.planner === "api") requiredNums.push(["Max tokens", config["max-tokens"]]);
  const badNum = requiredNums.find(([_, v]) => v == null || !Number.isFinite(v));
  if (!config.suite || badNum) {
    $("#launchStatus").textContent = !config.suite
      ? "Suite is required."
      : `${badNum[0]} is required.`;
    return;
  }
  if (config.planner === "api" && (!config.model || !config.model.includes(":"))) {
    $("#launchStatus").textContent = "API model must include a provider prefix, for example anthropic:claude-opus-4-8.";
    return;
  }
  $("#runBtn").disabled = true;
  $("#launchStatus").textContent =
    "starting run… this page will switch to the live monitor.";
  try {
    const resp = await fetch("/api/launch/run", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(config),
    });
    if (!resp.ok) throw new Error(await resp.text());
  } catch (e) {
    $("#runBtn").disabled = false;
    $("#launchStatus").textContent = "failed to start — check the terminal.";
    return;
  }
  pollForRun();
}
$("#runBtn").addEventListener("click", onRun);
$("#f-planner").addEventListener("change", () => {
  $("#f-model_custom").value = "";
  $("#launchStatus").textContent = "";
  updateBackendFields();
});

async function boot() {
  let st = { enabled: false };
  try { st = await fetch("/api/launch/state").then(x => x.json()); } catch (e) {}
  if (st.enabled && st.pending) {
    showLauncher(st.defaults);
  } else {
    // launcher already submitted (page reloaded) or not armed — go to monitor
    loadRun();
  }
}

boot();
</script>
</body>
</html>
